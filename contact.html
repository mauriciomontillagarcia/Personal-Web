<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mauricio Montilla — Contact: get in touch for projects or collaboration." />
  <meta name="author" content="Mauricio Montilla" />
  <title>Contact — Mauricio Montilla</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- FontAwesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwOg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- AOS — Animate On Scroll -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

  <!-- Site styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================================================
       NAVBAR
  ============================================================ -->
  <header class="navbar" id="navbar">
    <div class="navbar__inner container">

      <!-- Logo / Name -->
      <a href="index.html" class="navbar__logo">
        <span class="navbar__monogram">MM</span>
        <span class="navbar__name">Mauricio Montilla</span>
      </a>

      <!-- Desktop nav links -->
      <nav class="navbar__links" aria-label="Main navigation">
        <a href="index.html"    class="navbar__link" data-i18n="nav.about">Sobre mí</a>
        <a href="projects.html" class="navbar__link" data-i18n="nav.projects">Data Projects</a>
        <a href="apps.html"     class="navbar__link" data-i18n="nav.apps">Apps</a>
        <a href="blog.html"     class="navbar__link" data-i18n="nav.blog">Blog</a>
      </nav>

      <!-- Right controls -->
      <div class="navbar__controls">
        <button class="lang-toggle" id="langToggle" aria-label="Toggle language">
          <span id="langLabel">Cambiar a español</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
          <span class="hamburger__line"></span>
          <span class="hamburger__line"></span>
          <span class="hamburger__line"></span>
        </button>
      </div>

    </div><!-- /.navbar__inner -->

    <!-- Mobile menu overlay -->
    <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
      <nav class="mobile-menu__links" aria-label="Mobile navigation">
        <a href="index.html"    class="mobile-menu__link" data-i18n="nav.about">Sobre mí</a>
        <a href="projects.html" class="mobile-menu__link" data-i18n="nav.projects">Data Projects</a>
        <a href="apps.html"     class="mobile-menu__link" data-i18n="nav.apps">Apps</a>
        <a href="blog.html"     class="mobile-menu__link" data-i18n="nav.blog">Blog</a>
        <button class="lang-toggle lang-toggle--mobile" id="langToggleMobile" aria-label="Toggle language">
          <span id="langLabelMobile">Cambiar a español</span>
        </button>
      </nav>
    </div>
  </header>


  <!-- ============================================================
       PAGE HEADER
  ============================================================ -->
  <div class="page-header">
    <div class="container">
      <p class="section__label" data-i18n="contact.label">Contact</p>
      <h1 class="page-header__title" data-i18n="contact.title">Let's talk</h1>
      <p class="page-header__subtitle" data-i18n="contact.subtitle">
        Have a project in mind or just want to say hi?
      </p>
    </div>
  </div>


  <!-- ============================================================
       CONTACT CONTENT
  ============================================================ -->
  <main class="section" id="contact-main">
    <div class="container">

      <div class="contact__layout" data-aos="fade-up" data-aos-delay="100">

        <!-- Contact form -->
        <form class="contact__form" id="contactForm" novalidate>
          <div class="form__group">
            <label class="form__label" for="contactName" data-i18n="contact.form.name">Name</label>
            <input class="form__input" type="text" id="contactName" name="name"
                   data-i18n-placeholder="contact.form.namePlaceholder"
                   placeholder="Your name" required />
          </div>

          <div class="form__group">
            <label class="form__label" for="contactEmail" data-i18n="contact.form.email">Email</label>
            <input class="form__input" type="email" id="contactEmail" name="email"
                   data-i18n-placeholder="contact.form.emailPlaceholder"
                   placeholder="your@email.com" required />
          </div>

          <div class="form__group">
            <label class="form__label" for="contactMessage" data-i18n="contact.form.message">Message</label>
            <textarea class="form__input form__textarea" id="contactMessage" name="message"
                      data-i18n-placeholder="contact.form.messagePlaceholder"
                      placeholder="Tell me about your project..." rows="5" required></textarea>
          </div>

          <button type="submit" class="btn btn--primary btn--full" data-i18n="contact.form.submit">
            Send message
          </button>

          <!-- Success / error feedback -->
          <p class="form__feedback" id="formFeedback" aria-live="polite"></p>
        </form>

        <!-- Social + direct contact info -->
        <div class="contact__info">
          <p class="contact__info-text" data-i18n="contact.info.text">
            You can also reach me directly via email or find me on social media.
          </p>

          <a href="mailto:mauri@example.com" class="contact__email">
            <i class="fa-solid fa-envelope"></i>
            <span>mauri@example.com</span>
          </a>

          <!-- Social icons rendered by JS -->
          <div class="social-icons" id="socialIcons"></div>
        </div>

      </div><!-- /.contact__layout -->

    </div>
  </main>


  <!-- ============================================================
       FOOTER
  ============================================================ -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">
        <span data-i18n="footer.madeBy">Made by</span>
        <strong> Mauricio Montilla</strong> · <span id="footerYear"></span>
      </p>
    </div>
  </footer>


  <!-- ============================================================
       SCRIPTS
  ============================================================ -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="script.js"></script>

</body>
</html>
